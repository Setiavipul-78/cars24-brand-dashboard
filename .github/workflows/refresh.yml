name: Refresh dashboard data

on:
  schedule:
    # Runs at 06:00 UTC on the 2nd of every month
    - cron: '0 6 2 * *'
  workflow_dispatch:   # Allow manual trigger from GitHub UI

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to push data.json

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --quiet \
            pandas \
            python-dotenv \
            requests \
            google-api-python-client \
            google-auth-oauthlib \
            google-auth-httplib2

      - name: Fetch social media data
        env:
          GOOGLE_CLIENT_ID:             ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET:         ${{ secrets.GOOGLE_CLIENT_SECRET }}
          YT_REFRESH_TOKEN:             ${{ secrets.YT_REFRESH_TOKEN }}
          YT_CHANNEL_ID_CARS24_INDIA:      ${{ secrets.YT_CHANNEL_ID_CARS24_INDIA }}
          YT_CHANNEL_ID_TEAMBHP:           ${{ secrets.YT_CHANNEL_ID_TEAMBHP }}
          YT_CHANNEL_ID_INSIDER:           ${{ secrets.YT_CHANNEL_ID_INSIDER }}
          YT_CHANNEL_ID_CARS24_MALAYALAM:  ${{ secrets.YT_CHANNEL_ID_CARS24_MALAYALAM }}
          YT_CHANNEL_ID_AU:                ${{ secrets.YT_CHANNEL_ID_AU }}
          YT_CHANNEL_ID_UAE:               ${{ secrets.YT_CHANNEL_ID_UAE }}
          IG_ACCESS_TOKEN:              ${{ secrets.IG_ACCESS_TOKEN }}
          IG_USER_ID_CARS24_INDIA:      ${{ secrets.IG_USER_ID_CARS24_INDIA }}
          IG_USER_ID_TEAMBHP:           ${{ secrets.IG_USER_ID_TEAMBHP }}
          IG_USER_ID_AU:                ${{ secrets.IG_USER_ID_AU }}
          IG_USER_ID_UAE:               ${{ secrets.IG_USER_ID_UAE }}
        run: python fetch_social.py

      - name: Build data.json
        run: python build_data.py

      - name: Commit and push if data changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json data/*.csv
          git diff --staged --quiet || git commit -m "Auto-refresh: $(date -u +%Y-%m-%d)"
          git push
