name: Refresh dashboard data

on:
  schedule:
    - cron: '30 6 * * *'    # 12:00 PM IST daily (06:30 UTC)
  workflow_dispatch:          # manual trigger from GitHub UI

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4.2.2

      - uses: actions/setup-python@v5.3.0
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --quiet \
            pandas \
            python-dotenv \
            requests \
            google-api-python-client \
            google-auth-oauthlib \
            google-auth-httplib2

      - name: Fetch social media data
        env:
          GOOGLE_CLIENT_ID:                ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET:            ${{ secrets.GOOGLE_CLIENT_SECRET }}
          YT_REFRESH_TOKEN:                ${{ secrets.YT_REFRESH_TOKEN }}
          YT_REFRESH_TOKEN_INDIA:          ${{ secrets.YT_REFRESH_TOKEN_INDIA }}
          YT_REFRESH_TOKEN_TEAMBHP:        ${{ secrets.YT_REFRESH_TOKEN_TEAMBHP }}
          YT_REFRESH_TOKEN_INSIDER:        ${{ secrets.YT_REFRESH_TOKEN_INSIDER }}
          YT_REFRESH_TOKEN_TAMIL:          ${{ secrets.YT_REFRESH_TOKEN_TAMIL }}
          YT_REFRESH_TOKEN_MALAYALAM:      ${{ secrets.YT_REFRESH_TOKEN_MALAYALAM }}
          YT_REFRESH_TOKEN_UAE:            ${{ secrets.YT_REFRESH_TOKEN_UAE }}
          YT_CHANNEL_ID_CARS24_INDIA:      ${{ secrets.YT_CHANNEL_ID_CARS24_INDIA }}
          YT_CHANNEL_ID_TEAMBHP:           ${{ secrets.YT_CHANNEL_ID_TEAMBHP }}
          YT_CHANNEL_ID_INSIDER:           ${{ secrets.YT_CHANNEL_ID_INSIDER }}
          YT_CHANNEL_ID_CARS24_TAMIL:      ${{ secrets.YT_CHANNEL_ID_CARS24_TAMIL }}
          YT_CHANNEL_ID_CARS24_MALAYALAM:  ${{ secrets.YT_CHANNEL_ID_CARS24_MALAYALAM }}
          YT_CHANNEL_ID_AU:                ${{ secrets.YT_CHANNEL_ID_AU }}
          YT_CHANNEL_ID_UAE:               ${{ secrets.YT_CHANNEL_ID_UAE }}
          IG_USER_ID_CARS24_INDIA:         ${{ secrets.IG_USER_ID_CARS24_INDIA }}
          IG_ACCESS_TOKEN_CARS24_INDIA:    ${{ secrets.IG_ACCESS_TOKEN_CARS24_INDIA }}
          IG_USER_ID_TEAMBHP:              ${{ secrets.IG_USER_ID_TEAMBHP }}
          IG_ACCESS_TOKEN_TEAMBHP:         ${{ secrets.IG_ACCESS_TOKEN_TEAMBHP }}
          IG_USER_ID_CARS24_AU:            ${{ secrets.IG_USER_ID_CARS24_AU }}
          IG_ACCESS_TOKEN_CARS24_AU:       ${{ secrets.IG_ACCESS_TOKEN_CARS24_AU }}
          IG_USER_ID_CARS24_UAE:           ${{ secrets.IG_USER_ID_CARS24_UAE }}
          IG_ACCESS_TOKEN_CARS24_UAE:      ${{ secrets.IG_ACCESS_TOKEN_CARS24_UAE }}
          GSC_REFRESH_TOKEN:               ${{ secrets.GSC_REFRESH_TOKEN }}
          SHEETS_REFRESH_TOKEN:            ${{ secrets.SHEETS_REFRESH_TOKEN }}
        run: python3 fetch_social.py

      # Build + commit run even if the fetch step reported token/auth issues
      # (it still exits 0 for individual channels/sources that DID succeed) —
      # a broken token for one channel shouldn't block committing everything
      # else that refreshed fine. The overall run still shows red/failed
      # because of the fetch step, so the problem stays visible either way.
      - name: Build data.json
        if: always()
        run: python3 build_data.py

      - name: Commit and push if data changed
        if: always()
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json data/*.csv data/*.json
          git diff --staged --quiet && echo "No changes" && exit 0
          git commit -m "Auto-refresh: $(date -u '+%Y-%m-%d %H:%M UTC')"
          git pull --rebase origin main
          git push
